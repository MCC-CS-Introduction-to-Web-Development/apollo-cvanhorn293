type Query {
  products(offset: Int, limit: Int): [Product!]!
}

type Product {
  id: Int!
  title: String!
  price: Float!
  description: String!
  category: Category!
  images: [String!]!
}

type Category {
  id: Int!
  name: String!
  slug: String!
  image: String!
  creationAt: String!
  updatedAt: String!
}
